name: Build APK

on:
    push:
        branches:
            - main # runs when you push to main
    workflow_dispatch: # also allows manual trigger

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # 1. Get your code
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Setup pnpm (before Node so corepack / cache works correctly)
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            # 3. Setup Node.js
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"
                  cache-dependency-path: frontend/pnpm-lock.yaml

            # 4. Install dependencies
            - name: Install dependencies
              working-directory: frontend
              run: pnpm install --frozen-lockfile

            # 5. Build React app
            - name: Build frontend
              working-directory: frontend
              run: pnpm build

            # 6. Setup Java (needed for Android)
            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            # 7. Setup Android SDK
            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            # 8. Sync Capacitor
            - name: Sync Capacitor
              working-directory: frontend
              run: npx cap sync android

            # 9. Make gradlew executable
            - name: Make gradlew executable
              working-directory: frontend/android
              run: chmod +x gradlew

            # 10. Build debug APK
            - name: Build APK
              working-directory: frontend/android
              run: ./gradlew assembleDebug

            # 11. Upload APK as artifact (downloadable)
            - name: Upload APK
              uses: actions/upload-artifact@v4
              with:
                  name: jithub-debug.apk
                  path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
                  retention-days: 30 # keeps APK for 30 days
